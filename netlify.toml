[build]
  publish = "."

# Headers de sécurité et cache
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache pour assets statiques (images, CSS, JS)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache pour HTML (1 heure)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600"

# Redirections pour www canonicalization
[[redirects]]
  from = "https://psycho-sante74.com/*"
  to = "https://www.psycho-sante74.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://psycho-sante74.com/*"
  to = "https://www.psycho-sante74.com/:splat"
  status = 301
  force = true

